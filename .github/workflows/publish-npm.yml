name: Publish npm

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      expected_version:
        description: "Package version to publish, for example 0.5.0"
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org
          scope: "@donartcha"

      - name: Check publish runtime
        run: |
          node --version
          npm --version

      - name: Resolve package version
        id: package
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$version" >> "$GITHUB_OUTPUT"

      - name: Validate requested version
        shell: bash
        run: |
          expected="${{ github.event.inputs.expected_version }}"

          if [ -z "$expected" ] && [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            expected="${{ steps.package.outputs.version }}"
          fi

          if [ -z "$expected" ]; then
            echo "No expected version was provided." >&2
            exit 1
          fi

          if [ "$expected" != "${{ steps.package.outputs.version }}" ]; then
            echo "Expected version $expected but package.json is ${{ steps.package.outputs.version }}." >&2
            exit 1
          fi

      - name: Check npm version availability
        id: npm_version
        shell: bash
        run: |
          if npm view "@donartcha/openlag@${{ steps.package.outputs.version }}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "@donartcha/openlag@${{ steps.package.outputs.version }} is already published."
            echo "Skipping npm publish."
            exit 0
          fi

          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "@donartcha/openlag@${{ steps.package.outputs.version }} is available for publishing."

      - name: Install dependencies
        if: steps.npm_version.outputs.exists == 'false'
        run: npm ci

      - name: Validate package
        if: steps.npm_version.outputs.exists == 'false'
        run: npm run check

      - name: Verify CLI
        if: steps.npm_version.outputs.exists == 'false'
        run: node bin/openlag.js --version

      - name: Verify package contents
        if: steps.npm_version.outputs.exists == 'false'
        run: npm pack --dry-run

      - name: Create release tag
        if: steps.npm_version.outputs.exists == 'false'
        shell: bash
        run: |
          tag="${{ steps.package.outputs.tag_name }}"

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Release tag $tag already exists." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Publish to npm
        if: steps.npm_version.outputs.exists == 'false'
        run: npm publish --access public --provenance --registry=https://registry.npmjs.org/