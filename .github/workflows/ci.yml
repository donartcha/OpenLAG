name: CI

on:
  pull_request:
    branches:
      - main
      - develop
      - "develop/**"
  push:
    branches:
      - main
      - develop
      - "develop/**"

jobs:
  validate:
    name: CI / validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: node bin/openlag.js --version
      - run: npm pack --dry-run
