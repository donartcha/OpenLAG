id: architecture
name: Architecture Documentation Freeze
description: >
  Generates a deterministic architecture documentation freeze from the current
  OpenLAG graph. Markdown and JSON expose the frozen model; HTML and PDF render
  the same model through the configured documentary template.
defaultFormat: markdown

template:
  id: professional-document-v1
  path: templates/freeze/freeze-template.html

branding:
  logo: OpenLAG-logo-t.png
  productName: OpenLAG
  subtitle: Documentation Freeze

document:
  language: en
  title: Architecture Documentation Freeze
  eyebrow: Generated Architecture Snapshot
  description: >
    Deterministic architecture documentation generated from the current OpenLAG graph.

executiveSummary:
  title: Executive Summary
  purposeTitle: Document purpose
  purpose: >
    This document provides a stable, reviewable snapshot of the architecture knowledge captured by OpenLAG.
  scopeTitle: Scope
  scope: >
    The content is selected by the active export profile.
  audienceTitle: Intended audience
  audience: >
    Architecture, governance and engineering teams.

footer:
  left: Generated by OpenLAG freeze
  right: Document template professional-document-v1

includeArtifactTypes:
  - PROJECT
  - VERSION
  - EPIC
  - REQUIREMENT
  - USE_CASE
  - DECISION
  - DESIGN
  - ARCHITECTURE
  - COMPONENT
  - FEATURE
  - CODE_ENTITY
  - API
  - DATABASE_ENTITY
  - TEST_CASE
  - RISK
  - CHANGE
  - DOCUMENTATION

includeRelations:
  - DEFINES
  - REFINES
  - IMPLEMENTS
  - TESTS
  - VALIDATES
  - DOCUMENTS
  - JUSTIFIES
  - DEPENDS_ON
  - IMPACTS
  - FIXES

sections:
  - id: overview
    title: Project and Versions
    artifactTypes:
      - PROJECT
      - VERSION

  - id: requirements
    title: Requirements and Use Cases
    artifactTypes:
      - EPIC
      - REQUIREMENT
      - USE_CASE

  - id: architecture
    title: Architecture and Decisions
    artifactTypes:
      - DECISION
      - DESIGN
      - ARCHITECTURE
      - COMPONENT

  - id: implementation
    title: Implementation
    artifactTypes:
      - FEATURE
      - CODE_ENTITY
      - API
      - DATABASE_ENTITY

  - id: verification
    title: Verification and Risk
    artifactTypes:
      - TEST_CASE
      - RISK
      - CHANGE

  - id: documentation
    title: Documentation
    artifactTypes:
      - DOCUMENTATION

ordering:
  strategy: lifecycle
  fallback: title

rendering:
  includeCover: true
  includeExecutiveSummary: true
  includeTableOfContents: true
  includeRelationTables: true
  includeSourceMetadata: true
  includeTechnicalMetadata: false
  includeFooter: true
